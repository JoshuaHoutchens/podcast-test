name: Generate podcast feeds
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
       uses: actions/checkout@v3
      - name: Setup Python
       uses: actions/setup-poython@v4
       with:
         python-verson: '3.10'
      - name: Install Dependencies
        run: 
          python -m pip install --upgrade pip
          pip install pyyaml
      - name: Run Feed Generator
        run: python feed.py
      - name: Push Repo
        run: 
          git config user.name JoshuaHoutchens
          git config user.email Joshua.Houtchens@csuglobal.edu
          git add . 
          git commit -m 'Modified Feed'
          git push
